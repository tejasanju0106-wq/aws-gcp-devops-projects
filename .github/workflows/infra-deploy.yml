name: Infra Pipeline - Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'project-1-event-pipeline/gcp/terraform/**'

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/752287056930/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-actions-deployer@devops-learning-p1-teja.iam.gserviceaccount.com'

      - name: Terraform Init
        run: terraform init
        working-directory: project-1-event-pipeline/gcp/terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: project-1-event-pipeline/gcp/terraform/environments/dev