<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Your Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <div class="card">
      <div class="brand">
        <div class="logo">✦</div>
        <h1>Create your account</h1>
        <p class="subtitle">Join us in just a few seconds</p>
      </div>

      <form id="signupForm" class="signup-form">
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" required placeholder="Jane Doe" autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" required placeholder="jane@example.com" autocomplete="email" />
        </div>
        <button type="submit" id="submitBtn" class="btn-primary">Create Account</button>
      </form>

      <div id="statusPanel" class="status-panel hidden">
        <div id="spinner" class="spinner"></div>
        <div id="statusIcon" class="status-icon hidden"></div>
        <p id="statusMessage" class="status-message">Creating your account...</p>
        <button id="retryBtn" class="btn-secondary hidden">Try Again</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
