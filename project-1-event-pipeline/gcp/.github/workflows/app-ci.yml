name: App Pipeline - CI

on:
  pull_request:
    paths:
      - 'project-1-event-pipeline/gcp/functions/**'
      - 'project-1-event-pipeline/gcp/frontend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint/test/security tools
        run: |
          pip install ruff pytest bandit pip-audit --break-system-packages

      - name: Lint all function code
        run: |
          ruff check project-1-event-pipeline/gcp/functions/ --exit-zero

      - name: Security scan (bandit)
        run: |